<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🍽 오늘 뭐 먹지?</h1>

    <div id="mainScreen" class="screen active">
      <p>오늘의 메뉴를 랜덤으로 추천해드립니다!</p>
      <button onclick="showScreen('categoryScreen')">카테고리 선택</button>
      <button onclick="recommendMenu()">랜덤 추천</button>
      <button onclick="showScreen('loginScreen')">로그인</button>
      <button onclick="showMyPage()">마이페이지</button>

      <div id="resultBox" class="result">
        <h2>오늘의 추천 메뉴</h2>
        <p id="menuEmoji">❓</p>
        <p id="menuName">아직 추천 전입니다</p>
        <button onclick="recommendMenu()">다시 추천</button>
      </div>
    </div>

    <div id="categoryScreen" class="screen">
      <h2>카테고리 선택</h2>
      <button onclick="selectCategory('전체')">전체</button>
      <button onclick="selectCategory('한식')">한식</button>
      <button onclick="selectCategory('중식')">중식</button>
      <button onclick="selectCategory('일식')">일식</button>
      <button onclick="selectCategory('양식')">양식</button>
      <button onclick="selectCategory('패스트푸드')">패스트푸드</button>
      <button onclick="selectCategory('분식')">분식</button>
      <p id="selectedCategory">선택된 카테고리: 전체</p>
      <button onclick="showScreen('mainScreen')">확인</button>
      <button onclick="showScreen('mainScreen')">뒤로가기</button>
    </div>

    <div id="loginScreen" class="screen">
      <h2>로그인</h2>
      <input id="loginId" placeholder="아이디 또는 이메일" />
      <input id="loginPassword" type="password" placeholder="비밀번호" />
      <button onclick="login()">로그인</button>
      <button onclick="showScreen('signupScreen')">회원가입</button>
      <button onclick="showScreen('mainScreen')">뒤로가기</button>
      <p id="loginMessage"></p>
    </div>

    <div id="signupScreen" class="screen">
      <h2>회원가입</h2>
      <input id="signupId" placeholder="아이디" />
      <input id="signupEmail" placeholder="이메일" />
      <input id="signupPassword" type="password" placeholder="비밀번호" />
      <input id="signupPasswordCheck" type="password" placeholder="비밀번호 확인" />
      <button onclick="signup()">가입 완료</button>
      <button onclick="showScreen('loginScreen')">뒤로가기</button>
      <p id="signupMessage"></p>
    </div>

    <div id="myPageScreen" class="screen">
      <h2>마이페이지</h2>
      <p id="myInfo">내 정보</p>
      <button onclick="logout()">로그아웃</button>
      <button onclick="showScreen('mainScreen')">메인 화면으로 이동</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
